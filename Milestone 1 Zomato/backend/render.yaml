services:
  - type: web
    name: zomato-recommender-backend
    env: python
    plan: starter  # Increased from free to starter for more memory (1GB)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
