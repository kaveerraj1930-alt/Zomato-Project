services:
  - type: web
    name: zomato-recommender-backend
    env: python
    plan: free
    buildCommand: cd "Milestone 1 Zomato/backend" && pip install -r requirements.txt
    startCommand: cd "Milestone 1 Zomato/backend" && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
